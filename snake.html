<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      color: #4ecca3;
      letter-spacing: 4px;
    }

    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
    }

    #scoreboard span { color: #4ecca3; font-weight: bold; font-size: 1.2rem; }

    #canvas-wrapper {
      position: relative;
    }

    canvas {
      border: 2px solid #4ecca3;
      border-radius: 4px;
      display: block;
      box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(26, 26, 46, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      gap: 12px;
    }

    #overlay h2 { font-size: 1.8rem; color: #4ecca3; }
    #overlay p  { color: #aaa; font-size: 0.95rem; }

    button {
      margin-top: 8px;
      padding: 10px 32px;
      font-size: 1rem;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    button:hover { background: #38b28a; }

    #controls {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #666;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>贪吃蛇</h1>

  <div id="scoreboard">
    <div>得分：<span id="score">0</span></div>
    <div>最高分：<span id="best">0</span></div>
  </div>

  <div id="canvas-wrapper">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <h2>贪吃蛇</h2>
      <p>用方向键或 WASD 控制蛇的移动</p>
      <button id="btn">开始游戏</button>
    </div>
  </div>

  <div id="controls">
    方向键 / WASD — 移动 &nbsp;|&nbsp; P — 暂停
  </div>

  <script>
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const btn     = document.getElementById('btn');
    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');

    const COLS = 20, ROWS = 20;
    const CELL = canvas.width / COLS;  // 20px

    const COLORS = {
      bg:       '#16213e',
      grid:     '#1a2744',
      head:     '#4ecca3',
      body:     '#2eaf84',
      food:     '#e94560',
      foodGlow: 'rgba(233, 69, 96, 0.4)',
    };

    let snake, dir, nextDir, food, score, best = 0, state, raf, lastTime, interval;

    // --- init ---
    function startGame() {
      snake   = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score   = 0;
      state   = 'running';
      interval = 130;
      scoreEl.textContent = 0;
      placeFood();
      overlay.style.display = 'none';
      cancelAnimationFrame(raf);
      lastTime = null;
      raf = requestAnimationFrame(loop);
    }

    function placeFood() {
      const empties = [];
      for (let x = 0; x < COLS; x++)
        for (let y = 0; y < ROWS; y++)
          if (!snake.some(s => s.x === x && s.y === y))
            empties.push({ x, y });
      food = empties[Math.floor(Math.random() * empties.length)];
    }

    // --- game loop ---
    function loop(ts) {
      raf = requestAnimationFrame(loop);
      if (state !== 'running') return;
      if (!lastTime) lastTime = ts;
      if (ts - lastTime < interval) { draw(); return; }
      lastTime = ts;
      tick();
      draw();
    }

    function tick() {
      dir = { ...nextDir };
      const head = { x: (snake[0].x + dir.x + COLS) % COLS,
                     y: (snake[0].y + dir.y + ROWS) % ROWS };

      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver(); return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; }
        interval = Math.max(60, 130 - score * 3);
        placeFood();
      } else {
        snake.pop();
      }
    }

    function gameOver() {
      state = 'dead';
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <h2>游戏结束</h2>
        <p>得分：${score} &nbsp; 最高分：${best}</p>
        <button id="btn">再来一局</button>`;
      document.getElementById('btn').addEventListener('click', startGame);
    }

    // --- draw ---
    function draw() {
      // background
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // grid
      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath(); ctx.moveTo(0, j * CELL); ctx.lineTo(canvas.width, j * CELL); ctx.stroke();
      }

      // food glow
      ctx.save();
      ctx.shadowColor = COLORS.foodGlow;
      ctx.shadowBlur  = 12;
      ctx.fillStyle   = COLORS.food;
      const r = CELL / 2 - 2;
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      ctx.beginPath();
      ctx.arc(fx, fy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // snake
      snake.forEach((seg, i) => {
        const x = seg.x * CELL + 1;
        const y = seg.y * CELL + 1;
        const s = CELL - 2;
        ctx.fillStyle = i === 0 ? COLORS.head : COLORS.body;
        ctx.beginPath();
        ctx.roundRect(x, y, s, s, i === 0 ? 5 : 3);
        ctx.fill();

        // eyes on head
        if (i === 0) {
          ctx.fillStyle = COLORS.bg;
          const ex1 = seg.x * CELL + (dir.x === 0 ? CELL * 0.35 : (dir.x > 0 ? CELL * 0.6  : CELL * 0.25));
          const ey1 = seg.y * CELL + (dir.y === 0 ? CELL * 0.3  : (dir.y > 0 ? CELL * 0.6  : CELL * 0.25));
          const ex2 = seg.x * CELL + (dir.x === 0 ? CELL * 0.65 : ex1 - seg.x * CELL);
          const ey2 = seg.y * CELL + (dir.y === 0 ? CELL * 0.3  : ey1 - seg.y * CELL);

          // simpler eye positioning
          let e1x, e1y, e2x, e2y;
          if (dir.x === 1)  { e1x=CELL*0.7; e1y=CELL*0.25; e2x=CELL*0.7; e2y=CELL*0.65; }
          else if (dir.x===-1){ e1x=CELL*0.3; e1y=CELL*0.25; e2x=CELL*0.3; e2y=CELL*0.65; }
          else if (dir.y === 1){ e1x=CELL*0.25; e1y=CELL*0.7; e2x=CELL*0.65; e2y=CELL*0.7; }
          else              { e1x=CELL*0.25; e1y=CELL*0.3; e2x=CELL*0.65; e2y=CELL*0.3; }

          ctx.beginPath(); ctx.arc(seg.x*CELL+e1x, seg.y*CELL+e1y, 2, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(seg.x*CELL+e2x, seg.y*CELL+e2y, 2, 0, Math.PI*2); ctx.fill();
        }
      });
    }

    // --- input ---
    const KEY_MAP = {
      ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
      ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
      ArrowLeft:  { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
      ArrowRight: { x: 1,  y: 0 }, d: { x: 1,  y: 0 }, D: { x: 1,  y: 0 },
    };

    document.addEventListener('keydown', e => {
      if (e.key === 'p' || e.key === 'P') {
        if (state === 'running') state = 'paused';
        else if (state === 'paused') { state = 'running'; lastTime = null; }
        return;
      }
      const d = KEY_MAP[e.key];
      if (!d) return;
      // prevent reversing
      if (d.x !== 0 && d.x === -dir.x) return;
      if (d.y !== 0 && d.y === -dir.y) return;
      nextDir = d;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))
        e.preventDefault();
    });

    btn.addEventListener('click', startGame);

    // draw static frame on load
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  </script>
</body>
</html>
